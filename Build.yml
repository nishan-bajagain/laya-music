name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build and Release Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Write local.properties
        shell: bash
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Grant Execute Permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Stage APK
        run: |
          mkdir -p build-artifacts
          apk_path=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$apk_path" ]; then
            echo "No APK found in app/build/outputs/apk/release"
            exit 1
          fi
          cp "$apk_path" build-artifacts/laya-music-release.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laya-music-release-apk
          path: build-artifacts/laya-music-release.apk

      - name: Create GitHub Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/laya-music-release.apk
