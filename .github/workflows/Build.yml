name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build and Release Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          echo "y" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-37" \
            "build-tools;36.0.0"

      - name: Write local.properties
        shell: bash
        run: echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties

      - name: Grant Execute Permission
        run: chmod +x gradlew

      # The keystore is never stored in the repository.
      # Add KEYSTORE_BASE64 as a GitHub Actions secret:
      #   base64 -w 0 laya-release.jks | pbcopy   (macOS)
      #   base64 -w 0 laya-release.jks             (Linux, copy output)
      # Then paste the result into Settings → Secrets → KEYSTORE_BASE64.
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > app/laya-release.jks
            echo "Keystore decoded successfully."
          else
            echo "⚠️  KEYSTORE_BASE64 secret is not set — the APK will be unsigned."
            echo "    Set KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, and KEY_PASSWORD"
            echo "    in Settings → Secrets and variables → Actions."
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Verify APK exists
        run: |
          apk_path=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$apk_path" ]; then
            echo "ERROR: No APK found in app/build/outputs/apk/release"
            exit 1
          fi
          echo "APK found: $apk_path"
          ls -lh "$apk_path"

      - name: Stage APK
        run: |
          mkdir -p build-artifacts
          cp app/build/outputs/apk/release/laya.apk build-artifacts/laya.apk

      - name: Upload APK as Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: laya-apk
          path: build-artifacts/laya.apk
          retention-days: 30

      - name: Create GitHub Release and Upload APK
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: build-artifacts/laya.apk
          name: ${{ github.ref_name }}
          generate_release_notes: true
